name: Nordic Capital Watch

on:
  schedule:
    - cron: '0 7 * * 1'   # Måndag  08:00 CET (07:00 UTC)
    - cron: '0 7 * * 4'   # Torsdag 08:00 CET (07:00 UTC)
  workflow_dispatch:        # Manuell trigger för test

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python collector.py
